name: Build and Deploy Jekyll Site

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Mark repo safe (prevents dubious ownership errors)
      - name: Mark repo safe
        run: git config --global --add safe.directory /github/workspace

      # 3️⃣ Setup Ruby + bundler
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: bundle install

      # 5️⃣ Build Jekyll site
      - name: Build site
        run: bundle exec jekyll build

      # 6️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
        with:
          branch: gh-pages # optional if you want deployment branch
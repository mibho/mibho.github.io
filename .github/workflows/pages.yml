name: Build and Deploy Jekyll Site

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages:
    runs-on: ubuntu-latest
    concurrency:
      group: 'pages'
      cancel-in-progress: true

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v6

      # 2️⃣ Mark safe directory
      - name: Mark repo safe
        run: git config --global --add safe.directory /github/workspace

      # 3️⃣ Set up Ruby + Bundler
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      # 4️⃣ Install dependencies
      - run: bundle install

      # 5️⃣ Build Jekyll site
      - run: bundle exec jekyll build

      # 6️⃣ Upload to Pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v5